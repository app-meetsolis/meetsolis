summary: >
  Core enforcement logic is solid and 9 of 10 ACs pass. Two critical gaps block
  a clean PASS: UpgradeModal is not wired into the client creation error flow (AC 8
  partial), and increment functions lack error checking. Fixes are straightforward
  and low-risk. Ship after addressing criticals.

